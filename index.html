<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Learn Names</title>

    <!-- PWA / installability -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#FF6B6B" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Learn Names" />
    <meta name="mobile-web-app-capable" content="yes" />

    <script src="/runtime-config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Relative path so this resolves correctly whether the app is served
      // at the Cloud Run root or under the explainsims.com/<app>/ subpath.
      // Skipped on localhost so a stale dev cache never masks code changes.
      var host = location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
      if ('serviceWorker' in navigator && !isLocal) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
