<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream background fills the whole canvas so maskable cropping
       leaves no transparent gaps. -->
  <rect width="512" height="512" fill="#FFF9F0"/>

  <!-- Decorative accents kept inside the central 80% safe area so
       they survive maskable OS cropping on Android. -->
  <circle cx="120" cy="120" r="70" fill="#FFE66D" opacity="0.7"/>
  <circle cx="400" cy="400" r="60" fill="#4ECDC4" opacity="0.6"/>

  <!-- Main red badge with the app's signature bold dark border. -->
  <circle cx="256" cy="256" r="160" fill="#FF6B6B" stroke="#2D3436" stroke-width="16"/>

  <!-- UserSquare glyph (white) centered inside the badge. Uses a
       nested SVG so the original 24x24 coordinates stay legible. -->
  <svg x="171" y="171" width="170" height="170" viewBox="0 0 24 24"
       fill="none" stroke="white" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 21a6 6 0 0 0-12 0"/>
    <circle cx="12" cy="11" r="4"/>
    <rect x="3" y="3" width="18" height="18" rx="2"/>
  </svg>
</svg>
