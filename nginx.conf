server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Security headers - Allow embedding in iframes
    # X-Frame-Options removed - using CSP instead
    add_header Content-Security-Policy "frame-ancestors *" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Never cache runtime-config.js - it is regenerated from env vars on boot
    location = /runtime-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Never cache index.html either - it references hashed assets
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # PWA: never cache the service worker. A stale SW would pin
    # users to an old shell version forever. (The manifest is
    # generated as a Blob at runtime, so there's no static manifest
    # file to serve.)
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        try_files $uri =404;
    }

    # Hashed assets can be cached aggressively
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
